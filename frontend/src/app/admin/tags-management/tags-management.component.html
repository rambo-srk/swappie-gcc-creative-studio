<div class="p-6 text-white min-h-screen">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Tags Management</h1>
  </div>

  <!-- Create Tag -->
  <div class="mb-6 flex gap-4 items-center">
    <mat-form-field class="w-64">
      <mat-label>New Tag Name</mat-label>
      <input matInput [(ngModel)]="newTagName" placeholder="Enter tag name" (keyup.enter)="createTag()" />
    </mat-form-field>
    <studio-button variant="primary" size="medium" (click)="createTag()" [disabled]="!newTagName.trim()">
      Create Tag
    </studio-button>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="flex justify-center py-8">
    <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
  </div>

  <!-- Tags List -->
  <div *ngIf="!isLoading && tags.length > 0" class="overflow-hidden rounded-lg border border-neutral-800">
    <table class="min-w-full divide-y divide-neutral-800 bg-neutral-950">
      <thead>
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-neutral-400 uppercase tracking-wider">ID</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-neutral-400 uppercase tracking-wider">Name</th>
          <th class="px-6 py-3 text-right text-xs font-medium text-neutral-400 uppercase tracking-wider">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-neutral-800">
        <tr *ngFor="let tag of tags">
          <td class="px-6 py-4 whitespace-nowrap text-sm text-neutral-300">{{ tag.id }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-neutral-300">{{ tag.name }}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-right">
            <button mat-icon-button color="warn" (click)="deleteTag(tag.id)" title="Delete Tag">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- No Tags Message -->
  <div *ngIf="!isLoading && tags.length === 0" class="text-center py-8 text-neutral-400">
    <p>No tags found for this workspace.</p>
  </div>
</div>

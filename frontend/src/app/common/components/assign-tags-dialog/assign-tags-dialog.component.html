<div class="dialog-container p-6 bg-neutral-900 text-white rounded-lg max-w-md">
  <h2 mat-dialog-title class="text-xl font-bold mb-4">Assign Tags</h2>
  
  <div mat-dialog-content class="space-y-4">
    <!-- Existing and Available Tags -->
    <div class="tags-list max-h-48 overflow-y-auto space-y-2">
      <div *ngFor="let tag of availableTags" class="flex items-center gap-2">
        <mat-checkbox [checked]="isSelected(tag.name)" (change)="toggleTag(tag.name)">
          {{ tag.name }}
        </mat-checkbox>
      </div>
      <!-- Show selected tags that are not in available tags yet (e.g. newly added) -->
      <ng-container *ngFor="let tag of selectedTags">
        <div *ngIf="isNotAvailable(tag)" class="flex items-center gap-2">
          <mat-checkbox [checked]="true" (change)="toggleTag(tag)">
            {{ tag }}
          </mat-checkbox>
        </div>
      </ng-container>
    </div>

    <!-- Add New Tag -->
    <div class="flex gap-2 items-center mt-4">
      <mat-form-field class="flex-grow">
        <mat-label>New Tag</mat-label>
        <input matInput [(ngModel)]="newTagName" placeholder="Enter tag name" (keyup.enter)="addTag()" />
      </mat-form-field>
      <studio-button variant="primary" size="small" (click)="addTag()" [disabled]="!newTagName.trim()">
        Add
      </studio-button>
    </div>
  </div>

  <div mat-dialog-actions class="flex justify-end gap-2 mt-6">
    <studio-button variant="primary" size="medium" (click)="onCancel()">
      Cancel
    </studio-button>
    <studio-button variant="primary" size="medium" (click)="onSave()">
      Save
    </studio-button>
  </div>
</div>
